<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blogs - InfraNest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#1e3a5f', secondary: '#0f1f35', accent: '#c9a96e' } }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex min-h-screen text-gray-800 font-sans">
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    
    <!-- Sidebar -->
    <aside id="adminSidebar" class="w-64 bg-white shadow-2xl flex flex-col z-50 fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out h-screen">
        <div class="h-16 flex items-center justify-center border-b border-gray-200 px-6">
            <h1 class="text-xl font-bold text-primary tracking-wide">INFRA<span class="text-secondary">NEST</span></h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-chart-line w-6 text-center mr-2"></i> Dashboard
            </a>
            <a href="projects.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-building w-6 text-center mr-2"></i> Projects
            </a>
            <a href="services.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-tools w-6 text-center mr-2"></i> Services
            </a>
            <a href="leads.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-users w-6 text-center mr-2"></i> Leads
            </a>
            <div class="px-6 py-2 mt-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Content</div>
            <a href="blogs.html" class="sidebar-link active flex flex-row items-center px-6 py-3 text-sm font-medium">
                <i class="fas fa-newspaper w-6 text-center mr-2"></i> Blogs
            </a>
            <a href="testimonials.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-comment-dots w-6 text-center mr-2"></i> Testimonials
            </a>
            <a href="company.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-info-circle w-6 text-center mr-2"></i> Company Info
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button id="logoutBtn" class="w-full flex items-center text-sm font-medium text-red-600 hover:text-red-800 transition py-2 px-4 rounded hover:bg-red-50">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-0">
            <div class="flex items-center">
                <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700 p-2 mr-2 rounded focus:outline-none focus:bg-gray-100">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-lg font-medium text-gray-800">Manage Blogs</h2>
            </div>
            <div class="flex items-center">
                <div class="flex items-center text-sm font-medium text-gray-700 bg-gray-100 py-1.5 px-3 rounded-full cursor-pointer hover:bg-gray-200 transition">
                    <i class="fas fa-user-circle text-gray-500 text-lg mr-2"></i>
                    <span id="adminUserName">Admin</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6 fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold text-gray-800">Blog Posts</h3>
                <button onclick="openBlogModal()" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800 transition shadow">
                    <i class="fas fa-plus mr-1"></i> Add Post
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200 w-full text-sm">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Title</th>
                                <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Author</th>
                                <th class="px-6 py-3 text-left font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                <th class="px-6 py-3 text-right font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="blogsTableBody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="4" class="px-6 py-10 text-center"><div class="loader"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Blog Modal -->
    <div id="blogModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center fade-in">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl overflow-hidden m-4">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-semibold text-gray-800" id="modalTitle">Add New Blog Post</h3>
                <button onclick="closeBlogModal()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto max-h-[70vh]">
                <form id="blogForm" class="space-y-4">
                    <input type="hidden" id="blogId">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Title <span class="text-red-500">*</span></label>
                            <input type="text" id="bTitle" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                            <p class="text-xs text-red-500 mt-1 hidden validation-msg">Title is required.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Author <span class="text-red-500">*</span></label>
                            <input type="text" id="bAuthor" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                            <p class="text-xs text-red-500 mt-1 hidden validation-msg">Author is required.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date <span class="text-red-500">*</span></label>
                            <input type="date" id="bDate" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                            <p class="text-xs text-red-500 mt-1 hidden validation-msg">Date is required.</p>
                        </div>
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Content (Rich Text) <span class="text-red-500">*</span></label>
                            <div class="border border-gray-300 rounded focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition overflow-hidden">
                                <div class="bg-gray-100 border-b border-gray-300 px-3 py-2 flex flex-wrap gap-2 text-gray-600">
                                    <button type="button" onclick="document.execCommand('bold', false, null)" class="p-1 hover:bg-gray-200 rounded text-sm w-7 h-7 flex items-center justify-center" title="Bold"><i class="fas fa-bold"></i></button>
                                    <button type="button" onclick="document.execCommand('italic', false, null)" class="p-1 hover:bg-gray-200 rounded text-sm w-7 h-7 flex items-center justify-center" title="Italic"><i class="fas fa-italic"></i></button>
                                    <button type="button" onclick="document.execCommand('underline', false, null)" class="p-1 hover:bg-gray-200 rounded text-sm w-7 h-7 flex items-center justify-center" title="Underline"><i class="fas fa-underline"></i></button>
                                    <div class="w-px h-5 bg-gray-300 mx-1 mt-1"></div>
                                    <button type="button" onclick="document.execCommand('formatBlock', false, 'H2')" class="px-2 hover:bg-gray-200 rounded text-sm font-bold" title="Heading 2">H2</button>
                                    <button type="button" onclick="document.execCommand('formatBlock', false, 'H3')" class="px-2 hover:bg-gray-200 rounded text-sm font-bold" title="Heading 3">H3</button>
                                    <button type="button" onclick="document.execCommand('formatBlock', false, 'P')" class="px-2 hover:bg-gray-200 rounded text-sm font-bold" title="Paragraph">P</button>
                                    <div class="w-px h-5 bg-gray-300 mx-1 mt-1"></div>
                                    <button type="button" onclick="document.execCommand('insertUnorderedList', false, null)" class="p-1 hover:bg-gray-200 rounded text-sm w-7 h-7 flex items-center justify-center" title="Bullet List"><i class="fas fa-list-ul"></i></button>
                                </div>
                                <div id="bContentEditor" contenteditable="true" class="w-full px-4 py-3 min-h-[200px] outline-none prose max-w-none prose-img:rounded-md prose-headings:font-bold prose-a:text-blue-600"></div>
                            </div>
                            <textarea id="bContent" required class="hidden"></textarea>
                            <p class="text-xs text-red-500 mt-1 hidden validation-msg" id="contentError">Content is required.</p>
                        </div>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end">
                <button onclick="closeBlogModal()" type="button" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 mr-2 transition duration-200">Cancel</button>
                <button id="saveBlogBtn" onclick="saveBlog()" type="button" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition duration-200 shadow">Save Post</button>
            </div>
        </div>
    </div>

    <script src="js/confirm-modal.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/blogs.js"></script>
</body>
</html>
