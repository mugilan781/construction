<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Details - InfraNest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#1e3a5f', secondary: '#0f1f35', accent: '#c9a96e' } }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex min-h-screen text-gray-800 font-sans">
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    
    <!-- Sidebar -->
    <aside id="adminSidebar" class="w-64 bg-white shadow-2xl flex flex-col z-50 fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out h-screen">
        <div class="h-16 flex items-center justify-center border-b border-gray-200 px-6">
            <h1 class="text-xl font-bold text-primary tracking-wide">INFRA<span class="text-secondary">NEST</span></h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-chart-line w-6 text-center mr-2"></i> Dashboard
            </a>
            <a href="projects.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-building w-6 text-center mr-2"></i> Projects
            </a>
            <a href="services.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-tools w-6 text-center mr-2"></i> Services
            </a>
            <a href="leads.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-users w-6 text-center mr-2"></i> Leads
            </a>
            <div class="px-6 py-2 mt-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Content</div>
            <a href="blogs.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-newspaper w-6 text-center mr-2"></i> Blogs
            </a>
            <a href="testimonials.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-comment-dots w-6 text-center mr-2"></i> Testimonials
            </a>
            <a href="company.html" class="sidebar-link active flex flex-row items-center px-6 py-3 text-sm font-medium">
                <i class="fas fa-info-circle w-6 text-center mr-2"></i> Company Info
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button id="logoutBtn" class="w-full flex items-center text-sm font-medium text-red-600 hover:text-red-800 transition py-2 px-4 rounded hover:bg-red-50">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-0">
            <div class="flex items-center">
                <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700 p-2 mr-2 rounded focus:outline-none focus:bg-gray-100">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-lg font-medium text-gray-800">Company Settings</h2>
            </div>
            <div class="flex items-center">
                <div class="flex items-center text-sm font-medium text-gray-700 bg-gray-100 py-1.5 px-3 rounded-full cursor-pointer hover:bg-gray-200 transition">
                    <i class="fas fa-user-circle text-gray-500 text-lg mr-2"></i>
                    <span id="adminUserName">Admin</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6 fade-in">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden max-w-4xl mx-auto">
                <div class="border-b border-gray-100 px-6 py-4 flex justify-between items-center">
                    <h3 class="font-semibold text-gray-800 text-lg">Company Details</h3>
                </div>
                <div class="p-6">
                    <form id="companyForm" class="space-y-6">
                        <!-- About Section -->
                        <div>
                            <h4 class="font-semibold text-gray-800 mb-3 border-b pb-2 text-md">About Us (Rich Text)</h4>
                            <div class="border border-gray-300 rounded focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition overflow-hidden">
                                <div class="bg-gray-100 border-b border-gray-300 px-2 py-1.5 flex flex-wrap gap-1 text-gray-600 shadow-sm">
                                    <button type="button" onclick="document.execCommand('bold', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-bold"></i></button>
                                    <button type="button" onclick="document.execCommand('italic', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-italic"></i></button>
                                    <button type="button" onclick="document.execCommand('insertUnorderedList', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-list-ul"></i></button>
                                </div>
                                <div id="cAboutEditor" contenteditable="true" class="w-full px-3 py-2 min-h-[120px] outline-none prose prose-sm max-w-none"></div>
                                <textarea id="cAbout" class="hidden"></textarea>
                            </div>
                        </div>

                        <!-- Counters Info Section -->
                        <div>
                            <h4 class="font-semibold text-gray-800 mb-3 border-b pb-2 text-md">Global Statistics</h4>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <div>
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Years Experience</label>
                                    <input type="text" id="years_experience" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Projects Completed</label>
                                    <input type="text" id="projects_completed" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Awards Won</label>
                                    <input type="text" id="awards_won" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Active Engineers</label>
                                    <input type="text" id="active_engineers" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary text-sm">
                                </div>
                            </div>
                        </div>

                        <!-- Contact Info Section -->
                        <div>
                            <h4 class="font-semibold text-gray-800 mb-3 border-b pb-2 text-md">Contact Info</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Support Email <span class="text-red-500">*</span></label>
                                    <input type="email" id="company_email" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-sm transition">
                                    <p class="text-xs text-red-500 mt-1 hidden validation-msg">Support Email is required.</p>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Phone Number <span class="text-red-500">*</span></label>
                                    <input type="text" id="company_phone" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-sm transition">
                                    <p class="text-xs text-red-500 mt-1 hidden validation-msg">Phone Number is required.</p>
                                </div>
                                <div class="col-span-1 md:col-span-2">
                                    <label class="block text-xs font-medium text-gray-700 mb-1">Office Address</label>
                                    <input type="text" id="company_address" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary text-sm">
                                </div>
                            </div>
                        </div>

                        <div id="cValidationMsg" class="hidden text-sm text-red-600 mt-2"></div>
                        <div class="flex justify-end pt-4 border-t border-gray-100">
                            <button id="saveCompanyBtn" type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition duration-200 shadow">
                                Save Details
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform translate-y-20 opacity-0 flex items-center">
        <i class="fas fa-check-circle mr-2"></i>
        <span>Settings saved successfully!</span>
    </div>

    <script src="js/confirm-modal.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('companyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let isValid = true;
            let firstInvalid = null;
            const form = document.getElementById('companyForm');
            
            form.querySelectorAll('.validation-msg').forEach(el => el.classList.add('hidden'));
            form.querySelectorAll('.border-red-500').forEach(el => el.classList.remove('border-red-500', 'focus:ring-red-500', 'focus:border-red-500'));

            form.querySelectorAll('[required]').forEach(input => {
                if (!input.value.trim()) {
                    isValid = false;
                    input.classList.add('border-red-500', 'focus:ring-red-500', 'focus:border-red-500');
                    const msg = input.nextElementSibling;
                    if (msg && msg.classList.contains('validation-msg')) {
                        msg.classList.remove('hidden');
                    }
                    if (!firstInvalid) firstInvalid = input;
                }
            });

            if (!isValid) {
                if (firstInvalid) firstInvalid.focus();
                return;
            }

            const saveBtn = document.getElementById('saveCompanyBtn');
            const originalText = saveBtn.innerText;
            saveBtn.innerText = 'Saving...';
            saveBtn.disabled = true;
            saveBtn.classList.add('opacity-75', 'cursor-not-allowed');

            const payload = {
                about_description: document.getElementById('cAboutEditor').innerHTML,
                company_email: document.getElementById('company_email').value.trim(),
                company_phone: document.getElementById('company_phone').value.trim(),
                company_address: document.getElementById('company_address').value.trim(),
                years_experience: document.getElementById('years_experience').value.trim(),
                projects_completed: document.getElementById('projects_completed').value.trim(),
                awards_won: document.getElementById('awards_won').value.trim(),
                active_engineers: document.getElementById('active_engineers').value.trim()
            };

            try {
                // We post all settings at once. An endpoint /api/settings/bulk needs to handle this.
                const response = await api.post('/api/settings/bulk', payload);
                if (response && response.success) {
                    showToast('Settings saved successfully!');
                } else {
                    showToast('Failed to save settings', 'error');
                }
            } catch (error) {
                console.error(error);
                showToast('Failed to connect to server', 'error');
            }

            saveBtn.innerText = originalText;
            saveBtn.disabled = false;
            saveBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        });

        // Load data on start
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await api.get('/api/settings');
                if (response && response.success) {
                    const data = response.data; // object mapping keys to values
                    document.getElementById('cAboutEditor').innerHTML = data.about_description || '';
                    document.getElementById('company_email').value = data.company_email || '';
                    document.getElementById('company_phone').value = data.company_phone || '';
                    document.getElementById('company_address').value = data.company_address || '';
                    document.getElementById('years_experience').value = data.years_experience || '';
                    document.getElementById('projects_completed').value = data.projects_completed || '';
                    document.getElementById('awards_won').value = data.awards_won || '';
                    document.getElementById('active_engineers').value = data.active_engineers || '';
                }
            } catch (err) {
                console.error('Failed to load settings', err);
            }
        });
    </script>
</body>
</html>
