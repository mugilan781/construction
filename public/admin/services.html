<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Services - InfraNest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#1e3a5f', secondary: '#0f1f35', accent: '#c9a96e' } }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex min-h-screen text-gray-800 font-sans">
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    
    <!-- Sidebar -->
    <aside id="adminSidebar" class="w-64 bg-white shadow-2xl flex flex-col z-50 fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out h-screen">
        <div class="h-16 flex items-center justify-center border-b border-gray-200 px-6">
            <h1 class="text-xl font-bold text-primary tracking-wide">INFRA<span class="text-secondary">NEST</span></h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-chart-line w-6 text-center mr-2"></i> Dashboard
            </a>
            <a href="projects.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-building w-6 text-center mr-2"></i> Projects
            </a>
            <a href="services.html" class="sidebar-link active flex flex-row items-center px-6 py-3 text-sm font-medium">
                <i class="fas fa-tools w-6 text-center mr-2"></i> Services
            </a>
            <a href="leads.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-users w-6 text-center mr-2"></i> Leads
            </a>
            <div class="px-6 py-2 mt-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Content</div>
            <a href="blogs.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-newspaper w-6 text-center mr-2"></i> Blogs
            </a>
            <a href="testimonials.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-comment-dots w-6 text-center mr-2"></i> Testimonials
            </a>
            <a href="company.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-info-circle w-6 text-center mr-2"></i> Company Info
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button id="logoutBtn" class="w-full flex items-center text-sm font-medium text-red-600 hover:text-red-800 transition py-2 px-4 rounded hover:bg-red-50">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
        
        <!-- Header -->
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-0">
            <div class="flex items-center">
                <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700 p-2 mr-2 rounded focus:outline-none focus:bg-gray-100">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-lg font-medium text-gray-800">Manage Services</h2>
            </div>
            <div class="flex items-center">
                <div class="flex items-center text-sm font-medium text-gray-700 bg-gray-100 py-1.5 px-3 rounded-full cursor-pointer hover:bg-gray-200 transition">
                    <i class="fas fa-user-circle text-gray-500 text-lg mr-2"></i>
                    <span id="adminUserName">Admin</span>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6 fade-in">
            
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold text-gray-800">Services</h3>
                <button onclick="openServiceModal()" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800 transition shadow">
                    <i class="fas fa-plus mr-1"></i> Add Service
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="servicesGrid">
                <!-- Loader -->
                <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-10">
                    <div class="loader"></div>
                </div>
            </div>

        </main>
    </div>

    <!-- Service Modal -->
    <div id="serviceModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center fade-in">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden m-4">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-semibold text-gray-800" id="modalTitle">Add New Service</h3>
                <button onclick="closeServiceModal()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="serviceForm" class="space-y-4">
                    <input type="hidden" id="serviceId">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Service Name <span class="text-red-500">*</span></label>
                        <input type="text" id="sName" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                        <p class="text-xs text-red-500 mt-1 hidden validation-msg">Service Name is required.</p>
                    </div>
                    
                    <!-- Reusable Toolbar Snippet generator is usually better, but for simplicity we inline basic toolbars -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description (Rich Text) <span class="text-red-500">*</span></label>
                        <div class="border border-gray-300 rounded focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition overflow-hidden">
                            <div class="bg-gray-100 border-b border-gray-300 px-2 py-1.5 flex flex-wrap gap-1 text-gray-600 shadow-sm">
                                <button type="button" onclick="document.execCommand('bold', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-bold"></i></button>
                                <button type="button" onclick="document.execCommand('italic', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-italic"></i></button>
                                <button type="button" onclick="document.execCommand('insertUnorderedList', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-list-ul"></i></button>
                            </div>
                            <div id="sDescEditor" contenteditable="true" class="w-full px-3 py-2 min-h-[80px] outline-none prose prose-sm max-w-none"></div>
                            <textarea id="sDescription" required class="hidden"></textarea>
                        </div>
                        <p class="text-xs text-red-500 mt-1 hidden validation-msg" id="descError">Description is required.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Process (Rich Text)</label>
                        <div class="border border-gray-300 rounded focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition overflow-hidden">
                            <div class="bg-gray-100 border-b border-gray-300 px-2 py-1.5 flex flex-wrap gap-1 text-gray-600 shadow-sm">
                                <button type="button" onclick="document.execCommand('bold', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-bold"></i></button>
                                <button type="button" onclick="document.execCommand('italic', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-italic"></i></button>
                                <button type="button" onclick="document.execCommand('insertUnorderedList', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-list-ul"></i></button>
                            </div>
                            <div id="sProcessEditor" contenteditable="true" class="w-full px-3 py-2 min-h-[80px] outline-none prose prose-sm max-w-none"></div>
                            <textarea id="sProcess" class="hidden"></textarea>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Benefits (Rich Text)</label>
                        <div class="border border-gray-300 rounded focus-within:ring-1 focus-within:ring-primary focus-within:border-primary transition overflow-hidden">
                            <div class="bg-gray-100 border-b border-gray-300 px-2 py-1.5 flex flex-wrap gap-1 text-gray-600 shadow-sm">
                                <button type="button" onclick="document.execCommand('bold', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-bold"></i></button>
                                <button type="button" onclick="document.execCommand('italic', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-italic"></i></button>
                                <button type="button" onclick="document.execCommand('insertUnorderedList', false, null)" class="p-1 hover:bg-gray-200 rounded text-xs w-6 h-6 flex items-center justify-center"><i class="fas fa-list-ul"></i></button>
                            </div>
                            <div id="sBenefitsEditor" contenteditable="true" class="w-full px-3 py-2 min-h-[80px] outline-none prose prose-sm max-w-none"></div>
                            <textarea id="sBenefits" class="hidden"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end">
                <button onclick="closeServiceModal()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 mr-2 transition">Cancel</button>
                <button onclick="saveService()" class="px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition shadow">Save Service</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-y-20 opacity-0 flex items-center z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="toastMsg">Deleted successfully</span>
    </div>

    <!-- Scripts -->
    <script src="js/confirm-modal.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/services.js"></script>
</body>
</html>
