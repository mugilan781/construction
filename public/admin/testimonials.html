<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Testimonials - InfraNest Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { primary: '#1e3a5f', secondary: '#0f1f35', accent: '#c9a96e' } }
            }
        }
    </script>
</head>
<body class="bg-gray-100 flex min-h-screen text-gray-800 font-sans">
    <div id="sidebarOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden transition-opacity duration-300 opacity-0"></div>
    
    <!-- Sidebar -->
    <aside id="adminSidebar" class="w-64 bg-white shadow-2xl flex flex-col z-50 fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out h-screen">
        <div class="h-16 flex items-center justify-center border-b border-gray-200 px-6">
            <h1 class="text-xl font-bold text-primary tracking-wide">INFRA<span class="text-secondary">NEST</span></h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <a href="dashboard.html" class="sidebar-link flex items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-chart-line w-6 text-center mr-2"></i> Dashboard
            </a>
            <a href="projects.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-building w-6 text-center mr-2"></i> Projects
            </a>
            <a href="services.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-tools w-6 text-center mr-2"></i> Services
            </a>
            <a href="leads.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-users w-6 text-center mr-2"></i> Leads
            </a>
            <div class="px-6 py-2 mt-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Content</div>
            <a href="blogs.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-newspaper w-6 text-center mr-2"></i> Blogs
            </a>
            <a href="testimonials.html" class="sidebar-link active flex flex-row items-center px-6 py-3 text-sm font-medium">
                <i class="fas fa-comment-dots w-6 text-center mr-2"></i> Testimonials
            </a>
            <a href="company.html" class="sidebar-link flex flex-row items-center px-6 py-3 text-sm font-medium text-gray-600">
                <i class="fas fa-info-circle w-6 text-center mr-2"></i> Company Info
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <button id="logoutBtn" class="w-full flex items-center text-sm font-medium text-red-600 hover:text-red-800 transition py-2 px-4 rounded hover:bg-red-50">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-6 z-0">
            <div class="flex items-center">
                <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700 p-2 mr-2 rounded focus:outline-none focus:bg-gray-100">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-lg font-medium text-gray-800">Manage Testimonials</h2>
            </div>
            <div class="flex items-center">
                <div class="flex items-center text-sm font-medium text-gray-700 bg-gray-100 py-1.5 px-3 rounded-full cursor-pointer hover:bg-gray-200 transition">
                    <i class="fas fa-user-circle text-gray-500 text-lg mr-2"></i>
                    <span id="adminUserName">Admin</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6 fade-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-semibold text-gray-800">Testimonials</h3>
                <button onclick="openTestimonialModal()" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-800 transition shadow">
                    <i class="fas fa-plus mr-1"></i> Add Testimonial
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="testimonialsGrid">
                <div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-10">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Testimonial Modal -->
    <div id="testimonialModal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-gray-900 bg-opacity-50 flex items-center justify-center fade-in">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden m-4">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-semibold text-gray-800" id="modalTitle">Add New Testimonial</h3>
                <button onclick="closeTestimonialModal()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="testimonialForm" class="space-y-4">
                    <input type="hidden" id="tId">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Client Name <span class="text-red-500">*</span></label>
                        <input type="text" id="tName" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                        <p class="text-xs text-red-500 mt-1 hidden validation-msg">Client Name is required.</p>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Company (Optional)</label>
                            <input type="text" id="tCompany" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Rating (1-5) <span class="text-red-500">*</span></label>
                            <select id="tRating" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition">
                                <option value="" disabled selected>Select Rating</option>
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star</option>
                            </select>
                            <p class="text-xs text-red-500 mt-1 hidden validation-msg">Rating is required.</p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Review <span class="text-red-500">*</span></label>
                        <textarea id="tReview" required rows="4" class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition"></textarea>
                        <p class="text-xs text-red-500 mt-1 hidden validation-msg">Review is required.</p>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end">
                <button onclick="closeTestimonialModal()" type="button" class="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 mr-2 transition duration-200">Cancel</button>
                <button id="saveTestimonialBtn" onclick="saveTestimonial()" type="button" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition duration-200 shadow">Save Testimonial</button>
            </div>
        </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform translate-y-20 opacity-0 flex items-center z-50">
        <i class="fas fa-check-circle mr-2"></i>
        <span>Testimonial saved successfully!</span>
    </div>

    <script src="js/confirm-modal.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/testimonials.js"></script>
</body>
</html>
